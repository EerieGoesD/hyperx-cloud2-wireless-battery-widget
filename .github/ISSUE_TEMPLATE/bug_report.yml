name: Bug Report
description: Report a bug with HyperX Cloud II Battery Widget
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Open the widget
        2. ...
        3. ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: Windows Version
      description: Which version of Windows are you running?
      placeholder: "e.g. Windows 11 Pro 24H2"
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App Version
      description: Which version of the widget are you using?
      placeholder: "e.g. 1.5.9"
    validations:
      required: true

  - type: input
    id: headset
    attributes:
      label: Headset Model
      description: Which HyperX headset are you using?
      placeholder: "e.g. HyperX Cloud II Wireless"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
    validations:
      required: false
